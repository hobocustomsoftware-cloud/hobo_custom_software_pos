# Production overrides for Cloud VPS.
# Usage: docker compose -f compose/docker-compose.yml -f compose/docker-compose.prod.yml --env-file .env.prod up -d --build
# Ensure .env.prod has: DJANGO_SECRET_KEY, POSTGRES_PASSWORD, DJANGO_ALLOWED_HOSTS=<your-domain>, etc.

services:
  redis:
    ports: []   # Do not expose Redis to host in production
    restart: always

  postgres:
    ports: []   # Do not expose Postgres to host in production
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      SKIP_LICENSE: ${SKIP_LICENSE:-false}
      DEPLOYMENT_MODE: hosted
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M

  frontend:
    restart: always
    # Port 80 is still exposed for the reverse proxy / direct access; in front of Nginx proxy you may bind to 8080 and proxy 80→8080
    # ports: ["8080:80"]  # Uncomment if a host Nginx terminates SSL and proxies to 8080

# Wildcard subdomains for demo: *.yourdemo.com → same backend
# Each subdomain (e.g. shop1.yourdemo.com) is handled by the single backend;
# Backend reads Host and sets outlet_id from Outlet.code (e.g. code=shop1).
# Replace yourdemo.com with your actual demo domain.

upstream demo_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.yourdemo\.com$;
    # Or use a literal wildcard if your Nginx supports it:
    # server_name *.yourdemo.com;

    location / {
        proxy_pass http://demo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $subdomain;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass http://demo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $subdomain;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location /health/ {
        proxy_pass http://demo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}

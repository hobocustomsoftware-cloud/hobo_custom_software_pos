# Demo: Wildcard subdomains *.yourdemo.com → single backend (schema-based multi-tenancy)
# Set Outlet.code = subdomain (e.g. shop1, shop2). Replace yourdemo.com with your domain.

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.yourdemo\.com$;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location /health/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }
}

# HoBo POS - STANDALONE PRODUCTION (single shop)
# All paths below are relative to THIS file's location (server/).
# Run from project root: docker compose -f server/docker-compose.yml up -d --build
# (Build context must be repo root so Dockerfile can COPY WeldingProject/ and yp_posf/.)
# On Windows if build fails (path resolution), use: docker compose -f compose/docker-compose.server.yml up -d --build
#
# Database: single Postgres instance (postgres_data volume).
# Static/Media: Nginx serves /static/ and /media/ from backend_static and backend_media volumes.

services:
  redis:
    image: redis:7-alpine
    environment:
      TZ: Asia/Yangon
    command: redis-server --appendonly yes
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      TZ: Asia/Yangon
      POSTGRES_DB: ${POSTGRES_DB:-hobo_pos}
      POSTGRES_USER: ${POSTGRES_USER:-hobo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hobo} -d ${POSTGRES_DB:-hobo_pos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  backend:
    build:
      # Context = parent of server/ (repo root). Dockerfile path is relative to context → server/Dockerfile.
      context: ..
      dockerfile: server/Dockerfile
    image: hobo-pos-backend
    env_file: .env
    environment:
      TZ: Asia/Yangon
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DEMO_MODE: "False"
      DEPLOYMENT_MODE: hosted
      CORS_ALLOW_ALL: ${CORS_ALLOW_ALL:-False}
      DATABASE_URL: postgres://${POSTGRES_USER:-hobo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hobo_pos}
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      GOOGLE_SHEETS_JSON: ${GOOGLE_SHEETS_JSON:-}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID:-}
      GOOGLE_SHEETS_SHEET_NAME: ${GOOGLE_SHEETS_SHEET_NAME:-Registrations}
      MACHINE_ID: ${MACHINE_ID:-}
    # Bind 0.0.0.0:8000 so Nginx and host can reach backend (127.0.0.1 would be unreachable from other containers).
    command: >
      sh -c "/app/init.sh && exec gunicorn WeldingProject.wsgi:application
             --bind 0.0.0.0:8000
             --workers 2
             --threads 2
             --timeout 60
             --max-requests 1000
             --access-logfile -
             --error-logfile -"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - license_data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    environment:
      TZ: Asia/Yangon
    volumes:
      # Paths relative to this compose file (server/): server/nginx/...
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/app/staticfiles:ro
      - backend_media:/app/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
  backend_static:
  backend_media:
  license_data:

# Multi-instance POS: one compose per client. Generated by setup_client.sh.
# Each client has isolated DB and app container. Run from repo root: ./deploy/multi-instance/setup_client.sh CLIENT_NAME PORT
# Variables: CLIENT_NAME, PORT, DB_PASSWORD, SECRET_KEY (set in .env in same folder as this file)

services:
  postgres:
    image: postgres:16-alpine
    container_name: pos_db_${CLIENT_NAME}
    environment:
      POSTGRES_DB: pos_db_${CLIENT_NAME}
      POSTGRES_USER: pos_${CLIENT_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_${CLIENT_NAME} -d pos_db_${CLIENT_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - pos_net

  backend:
    build:
      context: ../../../..
      dockerfile: WeldingProject/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_BASE: /app/
    container_name: pos_app_${CLIENT_NAME}
    command: >
      sh -c "
        cp -r /frontend_built/* /app/static_frontend/ 2>/dev/null || true;
        python manage.py migrate --noinput &&
        python manage.py seed_base_units &&
        python manage.py collectstatic --noinput --clear 2>/dev/null || true &&
        exec daphne -b 0.0.0.0 -p 8000 WeldingProject.asgi:application
      "
    environment:
      DJANGO_SECRET_KEY: ${SECRET_KEY}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      DEPLOYMENT_MODE: hosted
      CORS_ALLOW_ALL: "True"
      DATABASE_URL: postgres://pos_${CLIENT_NAME}:${DB_PASSWORD}@postgres:5432/pos_db_${CLIENT_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD:-pos_redis}@redis:6379/0
      SKIP_LICENSE: "false"
      TRIAL_EXPIRED_CONTACT: ${TRIAL_EXPIRED_CONTACT:-Contact Admin to activate. | သက်တမ်းတိုးချဲ့ရန် ဆက်သွယ်ပါ။}
    volumes:
      - media:/app/media
      - license_data:/app/data
    ports:
      - "${PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - pos_net

  redis:
    image: redis:7-alpine
    container_name: pos_redis_${CLIENT_NAME}
    command: redis-server --requirepass ${REDIS_PASSWORD:-pos_redis} --maxmemory 64mb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    networks:
      - pos_net

volumes:
  postgres_data:
  media:
  license_data:

networks:
  pos_net:
    driver: bridge

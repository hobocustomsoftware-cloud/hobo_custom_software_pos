# Prometheus config for HoBo POS
# Used by docker-compose.monitoring.yml
# Backend metrics: GET http://backend:8000/metrics/

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'hobopos'
    metrics_path: /metrics/
    static_configs:
      # When run with: docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up
      # "backend" is the backend service name from docker-compose.yml
      - targets: ['backend:8000']
    scrape_interval: 30s
